name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - name: build
        run: go build -o kube-why .
      - name: vet
        run: go vet ./...
      - name: test
        run: go test ./... -v
